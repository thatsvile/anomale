# Notification Appearance                                                                                                                  
width = 210                                                                                                                                
height = 70                                                                                                                                
margin = 20                                                                                                                                
spacing = 10                                                                                                                               
corner = bottom-left # top-left, top-right, bottom-left, bottom-right                                                                      
timeout = 3 # seconds to sit before fading
# Optional: pin popups to a specific output by connector name (e.g. DP-1, HDMI-A-1).
# If unset, notifications use the primary/default monitor.
#monitor = DP-1
                                                                                                                                           
# Styling (pywal support: pywal_color0 to pywal_color15)                                                                                   
pywal = true                                                                                                                               
background_color = pywal_color0                                                                                                            
background_opacity = 1                                                                                                                     
border_color = pywal_color4                                                                                                                
border_width = 2                                                                                                                           
border_radius = 0                                                                                                                          
text_color = pywal_color7                                                                                                                  
                                                                                                                                           
font_family = 0xProto Nerd Font                                                                                                            
font_size = 12
