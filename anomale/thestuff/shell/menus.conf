# Power Menu
power_3=Reboot:systemctl reboot
power_1=Shutdown:systemctl poweroff
power_2=Logout:mmsg dispatch quit

# Wallpaper Selector
wallpapers_path=~/Pictures/wallpaper/
wallpapers_thumb_size=200
wallpapers_command=wal --backend haishoku -i [[w]] && pywalfox update; mmsg dispatch reload_config
use_last_wall=true
