[notifications]
# Notification Appearance
width = 350
height = 100
margin = 20
spacing = 10
corner = bottom-right # top-left, top-right, bottom-left, bottom-right
timeout = 2 # seconds to sit before fading

# Styling (pywal support: pywal_color0 to pywal_color15)
pywal = true
background_color = pywal_color0
background_opacity = 0.9
border_color = pywal_color4
border_width = 2
border_radius = 12
text_color = pywal_color7

font_family = Sans
font_size = 12
