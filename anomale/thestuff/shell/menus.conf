search_width=350
background_color=pywal_color0
background_opacity=0.6
# apps_background_color=pywal_color0
# apps_opacity=0.4
# search_background_color=pywal_color1
# search_background_opacity=0.9
border_color=pywal_color6
border_width=2
border_radius=0
text_color=pywal_color6
font_family=monospace
font_size=14.0
selection_color=pywal_color6
selection_text_color=pywal_color1
highlight_color=pywal_color2
